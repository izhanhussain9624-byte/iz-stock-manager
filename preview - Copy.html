<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZ-STOCK MANAGER Preview</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Libraries for PDF and JPG generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-primary: #0f172a;
            --text-title: #000000;
            --text-secondary: #334155;
            --card-bg: rgba(255, 255, 255, 0.25);
            --border-color: rgba(255, 255, 255, 0.4);
            --sidebar-bg: rgba(255, 255, 255, 0.3);
            --header-border: rgba(255, 255, 255, 0.3);
            --input-bg: rgba(255, 255, 255, 0.4);
            --input-border: rgba(255, 255, 255, 0.6);
            --input-text: #1e293b;
            --table-header-bg: rgba(255, 255, 255, 0.15);
            --row-border: rgba(255, 255, 255, 0.25);
            --row-hover-bg: rgba(255, 255, 255, 0.3);
            --btn-hover-bg: rgba(255, 255, 255, 0.4);
            --sku-bg: rgba(255, 255, 255, 0.5);
            --bill-summary-bg: rgba(255, 255, 255, 0.25);
            --bill-item-bg: rgba(255, 255, 255, 0.35);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --backdrop-blur: blur(28px) saturate(220%);
            --glass-gloss: inset 0 1px 1px rgba(255, 255, 255, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            --option-bg: #ffffff;
            --option-text: #000000;
            --nav-active-color: #e11d48;
            --nav-active-bg: rgba(225, 29, 72, 0.1);
        }

        body.dark-mode {
            --bg-color: #0f172a;
            --text-primary: #f8fafc;
            --text-title: #ffffff;
            --text-secondary: #cbd5e1;
            --card-bg: rgba(15, 23, 42, 0.25);
            --border-color: rgba(255, 255, 255, 0.08);
            --sidebar-bg: rgba(15, 23, 42, 0.3);
            --header-border: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(0, 0, 0, 0.15);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-text: #f8fafc;
            --table-header-bg: rgba(0, 0, 0, 0.15);
            --row-border: rgba(255, 255, 255, 0.05);
            --row-hover-bg: rgba(255, 255, 255, 0.1);
            --btn-hover-bg: rgba(255, 255, 255, 0.12);
            --sku-bg: rgba(255, 255, 255, 0.15);
            --bill-summary-bg: rgba(0, 0, 0, 0.25);
            --bill-item-bg: rgba(255, 255, 255, 0.05);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --glass-gloss: inset 0 1px 1px rgba(255, 255, 255, 0.15), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            --option-bg: #0f172a;
            --option-text: #ffffff;
            --nav-active-color: #f59e0b;
            --nav-active-bg: rgba(245, 158, 11, 0.15);
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at 10% 40%, rgba(239, 68, 68, 0.4), transparent 45%),
                radial-gradient(circle at 90% 20%, rgba(245, 158, 11, 0.4), transparent 45%),
                radial-gradient(circle at 50% 90%, rgba(225, 29, 72, 0.3), transparent 45%),
                linear-gradient(135deg, #fff1f2 0%, #fef3c7 100%);
            color: var(--text-primary);
            transition: background 0.5s, color 0.5s;
            min-height: 100vh;
            background-attachment: fixed;
        }

        body.dark-mode {
            background:
                radial-gradient(circle at 10% 40%, rgba(220, 38, 38, 0.4), transparent 45%),
                radial-gradient(circle at 90% 20%, rgba(217, 119, 6, 0.3), transparent 45%),
                radial-gradient(circle at 50% 90%, rgba(190, 18, 60, 0.25), transparent 45%),
                linear-gradient(135deg, #2a0a18 0%, #170d05 100%);
            background-attachment: fixed;
        }

        * {
            box-sizing: border-box;
        }

        @keyframes liquidEnter {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .dashboardContainer {
            display: flex;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: transparent;
            font-weight: 500;
        }

        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            flex-shrink: 0;
            transition: background-color 0.3s, border-color 0.3s;
            z-index: 10;
            box-shadow: var(--glass-gloss);
        }

        .sidebarHeader {
            padding: 2.5rem 1.5rem;
            border-bottom: 1px solid var(--header-border);
            margin-bottom: 1.5rem;
        }

        .title {
            font-size: 1.5rem;
            color: var(--text-title);
            font-weight: 900;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .sideNav {
            display: flex;
            flex-direction: column;
            padding: 0 1rem;
            gap: 0.25rem;
            flex: 1;
        }

        .navBtn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-align: left;
            display: flex;
            align-items: center;
        }

        .navBtn:hover {
            background: var(--btn-hover-bg);
            color: var(--text-primary);
            transform: translateX(6px);
        }

        .navBtn.active {
            color: var(--nav-active-color);
            background: var(--nav-active-bg);
            border-left: 4px solid var(--nav-active-color);
            transform: translateX(4px);
        }

        .bottomActions {
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .darkModeToggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: var(--btn-hover-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .darkModeToggle:hover {
            filter: brightness(0.95);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .mainContent {
            flex: 1;
            padding: 2.5rem;
            max-width: 1200px;
            width: 100%;
            overflow-x: hidden;
            margin: 0 auto;
        }

        .primaryButton {
            background: linear-gradient(135deg, #e11d48 0%, #f59e0b 100%);
            color: white;
            padding: 0.75rem 1.75rem;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 15px -1px rgba(225, 29, 72, 0.4);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 0.02em;
        }

        .primaryButton:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 25px -3px rgba(225, 29, 72, 0.6);
            filter: brightness(1.1);
        }

        .primaryButton:active:not(:disabled) {
            transform: translateY(1px) scale(0.98);
        }

        .primaryButton:disabled {
            background: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .card {
            animation: liquidEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            background: var(--card-bg);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: var(--shadow-lg), var(--glass-gloss);
            padding: 2rem;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s ease, background-color 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px 0 rgba(31, 38, 135, 0.2), var(--glass-gloss);
        }

        .tableCard {
            animation: liquidEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            background: var(--card-bg);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: var(--shadow-lg), var(--glass-gloss);
            overflow: hidden;
            padding: 0;
            overflow-x: auto;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s ease, background-color 0.3s;
        }

        .tableCard:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px 0 rgba(31, 38, 135, 0.2), var(--glass-gloss);
        }

        /* Table Styles */
        .stockTable {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .stockTable th {
            background-color: var(--table-header-bg);
            text-align: left;
            padding: 1.25rem 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 800;
            border-bottom: 2px solid var(--border-color);
        }

        .tableRow {
            border-bottom: 1px solid var(--row-border);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .tableRow:hover {
            background-color: var(--row-hover-bg);
            transform: scale(1.01) translateX(4px);
            box-shadow: var(--shadow-sm);
            z-index: 2;
            position: relative;
        }

        .tableRow td {
            padding: 1.25rem 1.5rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        .articleName {
            display: flex;
            align-items: center;
            white-space: nowrap;
            font-weight: 900;
            color: var(--text-title);
            font-size: 1.05rem;
        }

        .skuBadge {
            background-color: var(--sku-bg);
            color: var(--text-secondary);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.65rem;
            margin-right: 0.75rem;
            font-family: 'Fira Code', monospace;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .tagManufacturer {
            background-color: #dbeafe;
            color: #1d4ed8;
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            white-space: nowrap;
            display: inline-block;
            font-weight: 700;
        }

        .tagClient {
            background-color: #fce7f3;
            color: #be185d;
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            white-space: nowrap;
            display: inline-block;
            font-weight: 700;
        }

        .tagNone {
            background-color: var(--sku-bg);
            color: var(--text-secondary);
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            white-space: nowrap;
            display: inline-block;
            font-weight: 700;
        }

        .statusHealthy {
            color: #10b981;
            font-weight: 800;
        }

        .statusLow {
            color: #ef4444;
            font-weight: 800;
        }

        .priceTag {
            color: var(--text-title);
            font-weight: 700;
            font-family: 'Fira Code', monospace;
        }

        .costPriceTag {
            color: var(--text-secondary);
            font-weight: 700;
            font-family: 'Fira Code', monospace;
        }

        /* Form Styles */
        .sectionTitle {
            margin-top: 0;
            color: var(--text-title);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            font-weight: 900;
        }

        .formLayout {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 600px;
        }

        .formGroup {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .formGroup label {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-title);
            transition: color 0.3s;
        }

        .formGroup select,
        .formGroup input {
            padding: 0.85rem;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: var(--input-text);
            background-color: var(--input-bg);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: var(--glass-gloss);
            font-weight: 600;
        }

        .formGroup select:focus,
        .formGroup input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2), var(--glass-gloss);
            transform: translateY(-2px);
            color: #10b981;
        }

        .formRow {
            display: flex;
            gap: 1rem;
        }

        .formRow .formGroup {
            flex: 1;
        }

        select option {
            background-color: var(--option-bg) !important;
            color: var(--option-text) !important;
        }

        /* Billing Section */
        .billingLayout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 768px) {
            .billingLayout {
                grid-template-columns: 1fr;
            }
        }

        .addItemGroup {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .addItemGroup select {
            flex: 1;
            padding: 0.85rem;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-family: 'Inter';
            font-size: 1rem;
            background-color: var(--input-bg);
            color: var(--input-text);
            backdrop-filter: var(--backdrop-blur);
            transition: all 0.3s;
            box-shadow: var(--glass-gloss);
            font-weight: 600;
        }

        .addItemGroup input {
            padding: 0.85rem;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-family: 'Inter';
            font-size: 1rem;
            background-color: var(--input-bg);
            color: var(--input-text);
            backdrop-filter: var(--backdrop-blur);
            transition: all 0.3s;
            box-shadow: var(--glass-gloss);
            font-weight: 600;
        }

        .addItemGroup select:focus,
        .addItemGroup input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2), var(--glass-gloss);
            transform: translateY(-2px);
            color: #10b981;
        }

        .secondaryButton {
            background: var(--btn-hover-bg);
            color: var(--text-primary);
            padding: 0.85rem 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: var(--backdrop-blur);
            box-shadow: var(--glass-gloss);
        }

        .secondaryButton:hover {
            filter: brightness(0.95);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm), var(--glass-gloss);
        }

        .secondaryButton:active {
            transform: translateY(1px);
        }

        .billSummary {
            animation: liquidEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            background: var(--bill-summary-bg);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            min-height: 300px;
            box-shadow: var(--shadow-lg), var(--glass-gloss);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .billSummary:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px 0 rgba(31, 38, 135, 0.2), var(--glass-gloss);
        }

        .billSummary h3 {
            margin-top: 0;
            color: var(--text-title);
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
        }

        .emptyState {
            color: var(--text-secondary);
            font-style: italic;
            text-align: center;
            margin: auto 0;
        }

        .billList {
            list-style: none;
            padding: 0;
            margin: 0 0 2rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex-grow: 1;
        }

        .billList li {
            display: flex;
            flex-direction: column;
            padding: 0.85rem;
            background: var(--bill-item-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: liquidEnter 0.4s forwards;
        }

        .billList li:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-md);
        }

        .billList li .topRow {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
        }

        .billList li .bottomRow {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .billList li .itemName {
            font-weight: 500;
            color: var(--text-title);
        }

        .billList li .itemQty {
            color: var(--text-secondary);
            font-weight: 600;
            background: var(--sku-bg);
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
        }

        .fullWidth {
            width: 100%;
        }

        /* My Bills Section */
        .billsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .billCardWrapper {
            animation: liquidEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            background: var(--card-bg);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            border-radius: 24px;
            box-shadow: var(--shadow-lg), var(--glass-gloss);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s ease;
        }

        .billCardWrapper:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 50px 0 rgba(31, 38, 135, 0.2), var(--glass-gloss);
        }

        .billContent {
            padding: 2rem;
            background: transparent;
            border-bottom: 2px dashed var(--border-color);
        }

        .billHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .billHeader h3 {
            margin: 0;
            color: var(--text-title);
        }

        .billDate {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .billClientInfo {
            margin-bottom: 1.5rem;
        }

        .billClientInfo p {
            margin: 0 0 0.25rem 0;
            font-size: 0.95rem;
        }

        .billItemsTable {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
        }

        .billItemsTable th {
            text-align: left;
            padding: 0.75rem 0.75rem;
            border: 1px solid var(--border-color);
            background-color: var(--table-header-bg);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .billItemsTable td {
            padding: 0.75rem 0.75rem;
            font-size: 0.95rem;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .billTotalSection {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 2px solid var(--border-color);
        }

        .billTotal {
            text-align: right;
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--text-title);
        }

        .billActions {
            padding: 1rem;
            background: var(--bill-summary-bg);
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .actionBtn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.25rem;
        }

        .actionBtn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
            filter: brightness(1.05);
        }

        .actionBtn:active {
            transform: translateY(1px);
        }

        .btnJpg {
            background: #e0f2fe;
            color: #0369a1;
        }

        .btnJpg:hover {
            background: #bae6fd;
        }

        .btnPdf {
            background: #fce7f3;
            color: #be185d;
        }

        .btnPdf:hover {
            background: #fbcfe8;
        }

        .btnWa {
            background: #dcfce7;
            color: #15803d;
        }

        .btnWa:hover {
            background: #bbf7d0;
        }

        .multiSelectToolbar {
            background: var(--card-bg);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            backdrop-filter: var(--backdrop-blur);
            box-shadow: var(--shadow-sm);
            animation: liquidEnter 0.4s ease forwards;
        }

        .billCheckbox {
            appearance: none;
            -webkit-appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 50%;
            border: 2px solid var(--text-secondary);
            background: transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--glass-gloss);
            margin: 0;
        }

        .billCheckbox:checked {
            background: var(--nav-active-color);
            border-color: var(--nav-active-color);
        }

        .billCheckbox:checked::after {
            content: '';
            width: 0.35rem;
            height: 0.6rem;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 0.15rem;
        }

        .billCheckbox:hover {
            transform: scale(1.15);
        }

        .selectionControls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Mobile / Responsive Styles for iOS, Android, and Windows Mobile */
        @media (max-width: 768px) {
            .dashboardContainer {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .sidebarHeader {
                padding: 1.25rem 1.5rem 0.75rem 1.5rem;
                margin-bottom: 0;
                text-align: center;
            }

            .sideNav {
                flex-direction: row;
                flex-wrap: nowrap;
                padding: 0 1rem;
                gap: 0.5rem;
                justify-content: flex-start;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }

            .sideNav::-webkit-scrollbar {
                display: none;
            }

            .navBtn {
                flex: 0 0 auto;
                min-width: auto;
                justify-content: center;
                text-align: center;
                padding: 0.75rem 1rem;
                font-size: 0.95rem;
                white-space: nowrap;
            }

            .navBtn.active {
                border-left: none;
                border-bottom: 4px solid #4f46e5;
            }

            .bottomActions {
                padding: 1rem;
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 0.5rem;
                justify-content: space-between;
            }

            .bottomActions>div:first-child {
                flex: 1 1 100%;
                margin-bottom: 0 !important;
            }

            .bottomActions>.secondaryButton,
            .bottomActions>.darkModeToggle {
                flex: 1;
                margin: 0 !important;
                padding: 0.5rem;
                font-size: 0.85rem;
            }

            .bottomActions>div:last-child {
                flex: 1 1 100%;
                margin-top: 0.25rem;
            }

            .mainContent {
                padding: 1rem;
            }

            .formRow {
                flex-direction: column;
                gap: 1rem;
            }

            .card {
                padding: 1.5rem 1rem;
            }

            .billsGrid {
                grid-template-columns: 1fr;
            }

            /* Make table scrollable smoothly on mobile */
            .tableCard {
                margin: 0 -1rem;
                border-radius: 0;
                width: calc(100% + 2rem);
            }

            .stockTable th,
            .tableRow td {
                padding: 1rem 0.5rem;
                font-size: 0.85rem;
                white-space: nowrap;
            }

            /* Responsive Add Item Group */
            .addItemGroup {
                flex-direction: column;
            }

            .addItemGroup input {
                width: 100% !important;
            }

            .billSummary {
                margin-top: 2rem;
            }
        }
        .print-mode {
            background-color: #ffffff !important;
            color: #000000 !important;
        }
        .print-mode * {
            color: #000000 !important;
            font-weight: 700 !important;
            border-color: #000000 !important;
        }
        .print-mode .billHeader h2 {
            color: #dc2626 !important;
        }
        .print-mode .billItemsTable th {
            background-color: #f3f4f6 !important;
        }
        .print-mode .timePart {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const mockClients = [
            { id: 'c1', name: 'Acme Corp', phone: '+1234567890' },
            { id: 'c2', name: 'Global Tech Solutions', phone: '+0987654321' },
            { id: 'c3', name: 'Stark Industries', phone: '+1122334455' }
        ];

        const mockManufacturers = [
            { id: 'm1', name: 'TechTronics Inc.' },
            { id: 'm2', name: 'ElectroSource Factory' }
        ];

        const defaultInventory = [
            { id: '1', sku: 'ART-001', name: 'Sole', currentStock: 450, costPrice: 2.50, sellingPrice: 5.00, lastTransaction: { type: 'INCOMING', manufacturer: { name: 'TechTronics Inc.' } } },
            { id: '2', sku: 'ART-002', name: 'Foam', currentStock: 150, costPrice: 1.20, sellingPrice: 3.50, lastTransaction: { type: 'OUTGOING', client: { name: 'Acme Corp' } } },
            { id: '3', sku: 'ART-003', name: 'Buckle', currentStock: 1200, costPrice: 0.15, sellingPrice: 0.50, lastTransaction: null },
            { id: '4', sku: 'ART-004', name: 'Upper', currentStock: 300, costPrice: 4.00, sellingPrice: 8.50, lastTransaction: null }
        ];

        function App() {
            const [currentUser, setCurrentUser] = useState(() => localStorage.getItem('lfox_lastUser') || null);
            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('lfox_darkmode') === 'true');

            useEffect(() => {
                if (isDarkMode) document.body.classList.add('dark-mode');
                else document.body.classList.remove('dark-mode');
                localStorage.setItem('lfox_darkmode', isDarkMode);
            }, [isDarkMode]);

            const handleLogout = () => {
                setCurrentUser(null);
                localStorage.removeItem('lfox_lastUser');
            };

            if (!currentUser) {
                return <LoginScreen onLogin={(user) => { setCurrentUser(user); localStorage.setItem('lfox_lastUser', user); }} isDarkMode={isDarkMode} toggleDarkMode={() => setIsDarkMode(!isDarkMode)} />;
            }

            return <StockDashboard key={currentUser} currentUser={currentUser} onLogout={handleLogout} isDarkMode={isDarkMode} toggleDarkMode={() => setIsDarkMode(!isDarkMode)} />;
        }

        function LoginScreen({ onLogin, isDarkMode, toggleDarkMode }) {
            const [userId, setUserId] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                const id = userId.trim().toLowerCase();
                const pwd = password.trim();
                if (!id || !pwd) return setError('Please enter User ID and Password.');

                // Hardcoded authorized users
                const validUsers = {
                    'user121': '121',
                    'user212': '212'
                };

                if (validUsers[id]) {
                    if (validUsers[id] === pwd) {
                        const savedName = id === 'user121' ? 'L-fox' : id;
                        onLogin(savedName);
                    } else {
                        setError('Incorrect password. Please try again.');
                    }
                } else {
                    setError('Invalid User ID. Only authorized users can log in.');
                }
            };

            return (
                <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh', justifyContent: 'center', alignItems: 'center', padding: '2rem' }}>
                    <div className="card" style={{ maxWidth: '400px', width: '100%', marginBottom: '2rem' }}>
                        <h2 style={{ textAlign: 'center', marginBottom: '0.5rem', color: 'var(--text-title)' }}>IZ-STOCK MANAGER</h2>
                        <p style={{ textAlign: 'center', color: 'var(--text-secondary)', marginBottom: '2rem' }}>Login or Create Account</p>
                        {error && <div style={{ color: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', padding: '0.75rem', borderRadius: '8px', marginBottom: '1rem', fontSize: '0.9rem', textAlign: 'center' }}>{error}</div>}
                        <form onSubmit={handleLogin} className="formLayout" style={{ gap: '1rem' }}>
                            <div className="formGroup">
                                <label>User ID</label>
                                <input type="text" value={userId} onChange={e => setUserId(e.target.value)} placeholder="Enter authorized ID" />
                            </div>
                            <div className="formGroup">
                                <label>Password</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Enter password" />
                            </div>
                            <button type="submit" className="primaryButton" style={{ marginTop: '1rem', width: '100%' }}>Login</button>
                        </form>
                    </div>
                    <button className="darkModeToggle" onClick={toggleDarkMode} style={{ maxWidth: '200px', marginBottom: '0.5rem' }}>
                        {isDarkMode ? '☀️ Light Mode' : '🌙 Night Mode'}
                    </button>
                    <div style={{ fontSize: '0.75rem', color: 'var(--text-secondary)', textAlign: 'center' }}>
                        Created by <strong>Izhan Hussain</strong>
                    </div>
                </div>
            );
        }

        function StockDashboard({ currentUser, onLogout, isDarkMode, toggleDarkMode }) {
            const [activeTab, setActiveTab] = useState('inventory');

            // Inventory & Bills State with LocalStorage persistence scoped to currentUser
            const [inventory, setInventory] = useState(() => {
                const saved = localStorage.getItem(`lfox_inventory_${currentUser}`);
                return saved ? JSON.parse(saved) : defaultInventory;
            });
            const [finalizedBills, setFinalizedBills] = useState(() => {
                const saved = localStorage.getItem(`lfox_bills_${currentUser}`);
                return saved ? JSON.parse(saved) : [];
            });
            const [billCounter, setBillCounter] = useState(() => {
                const saved = localStorage.getItem(`lfox_billCounter_${currentUser}`);
                return saved ? parseInt(saved) : 1;
            });
            const [selectedBills, setSelectedBills] = useState([]);
            const [waOptionsOpenFor, setWaOptionsOpenFor] = useState(null);

            const toggleBillSelection = (billId) => {
                setSelectedBills(prev => prev.includes(billId) ? prev.filter(id => id !== billId) : [...prev, billId]);
            };

            const selectAllBills = () => {
                if (selectedBills.length === finalizedBills.length) {
                    setSelectedBills([]);
                } else {
                    setSelectedBills(finalizedBills.map(b => b.id));
                }
            };

            const deleteSelectedBills = () => {
                if (window.confirm(`Are you sure you want to delete ${selectedBills.length} bill(s)?`)) {
                    setFinalizedBills(finalizedBills.filter(b => !selectedBills.includes(b.id)));
                    setSelectedBills([]);
                }
            };

            const shareSelectedBills = () => {
                const selected = finalizedBills.filter(b => selectedBills.includes(b.id));
                let shareText = "Shared Invoices Summary:\n\n";
                selected.forEach(b => {
                    shareText += `*Invoice ${b.id}* - ${b.date}\nClient: ${b.client.name}\nTotal: ₹${b.totalAmount.toFixed(2)}\n\n`;
                });
                window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`, '_blank');
            };

            // Form States
            const [updateForm, setUpdateForm] = useState({ articleId: '', type: 'INCOMING', quantity: 1, entityId: '', costPrice: '', sellingPrice: '' });
            const [billForm, setBillForm] = useState({ clientId: '', items: [] });
            const [currentBillItem, setCurrentBillItem] = useState({ articleId: '', quantity: 1, unitPrice: '' });

            // Persist changes scoped by currentUser
            useEffect(() => { localStorage.setItem(`lfox_inventory_${currentUser}`, JSON.stringify(inventory)); }, [inventory, currentUser]);
            useEffect(() => { localStorage.setItem(`lfox_bills_${currentUser}`, JSON.stringify(finalizedBills)); }, [finalizedBills, currentUser]);
            useEffect(() => { localStorage.setItem(`lfox_billCounter_${currentUser}`, billCounter.toString()); }, [billCounter, currentUser]);

            const handleUpdateStock = (e) => {
                e.preventDefault();
                const entityName = updateForm.type === 'INCOMING'
                    ? mockManufacturers.find(m => m.id === updateForm.entityId)?.name
                    : mockClients.find(c => c.id === updateForm.entityId)?.name;

                const updatedInventory = inventory.map(item => {
                    if (item.id === updateForm.articleId) {
                        let newStock = item.currentStock;
                        if (updateForm.type === 'INCOMING') {
                            newStock += updateForm.quantity;
                        } else {
                            newStock -= updateForm.quantity;
                            if (newStock < 0) newStock = 0;
                        }

                        let newCost = item.costPrice;
                        let newSelling = item.sellingPrice;
                        if (updateForm.costPrice !== '') newCost = parseFloat(updateForm.costPrice);
                        if (updateForm.sellingPrice !== '') newSelling = parseFloat(updateForm.sellingPrice);

                        return {
                            ...item,
                            currentStock: newStock,
                            costPrice: newCost,
                            sellingPrice: newSelling,
                            lastTransaction: {
                                type: updateForm.type,
                                manufacturer: updateForm.type === 'INCOMING' ? { name: entityName } : undefined,
                                client: updateForm.type === 'OUTGOING' ? { name: entityName } : undefined,
                            }
                        };
                    }
                    return item;
                });

                setInventory(updatedInventory);
                setUpdateForm({ articleId: '', type: 'INCOMING', quantity: 1, entityId: '', costPrice: '', sellingPrice: '' });
                setActiveTab('inventory');
            };

            const handleAddBillItem = (e) => {
                e.preventDefault();
                if (!currentBillItem.articleId || currentBillItem.quantity < 1 || currentBillItem.unitPrice === '') return;

                const article = inventory.find(a => a.id === currentBillItem.articleId);
                const existing = billForm.items.find(i => i.articleId === currentBillItem.articleId && i.unitPrice === parseFloat(currentBillItem.unitPrice));

                if (existing) {
                    setBillForm({
                        ...billForm,
                        items: billForm.items.map(i => (i.articleId === currentBillItem.articleId && i.unitPrice === parseFloat(currentBillItem.unitPrice))
                            ? { ...i, quantity: i.quantity + currentBillItem.quantity }
                            : i)
                    });
                } else {
                    setBillForm({
                        ...billForm,
                        items: [...billForm.items, {
                            articleId: currentBillItem.articleId,
                            name: article.name,
                            quantity: currentBillItem.quantity,
                            unitPrice: parseFloat(currentBillItem.unitPrice)
                        }]
                    });
                }
                setCurrentBillItem({ articleId: '', quantity: 1, unitPrice: '' });
            };

            const handleFinalizeBill = () => {
                const client = mockClients.find(c => c.id === billForm.clientId);

                // Deduct stock
                let updatedInventory = [...inventory];
                billForm.items.forEach(billItem => {
                    updatedInventory = updatedInventory.map(item => {
                        if (item.id === billItem.articleId) {
                            return {
                                ...item,
                                currentStock: Math.max(0, item.currentStock - billItem.quantity),
                                lastTransaction: { type: 'OUTGOING', client: { name: client.name } }
                            };
                        }
                        return item;
                    });
                });
                setInventory(updatedInventory);

                const newBillId = 'INV-' + billCounter.toString().padStart(4, '0');
                const totalAmount = billForm.items.reduce((sum, item) => sum + (item.quantity * item.unitPrice), 0);

                const newBill = {
                    id: newBillId,
                    client: client,
                    date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString(),
                    items: [...billForm.items],
                    totalItems: billForm.items.reduce((sum, item) => sum + item.quantity, 0),
                    totalAmount: totalAmount
                };

                setFinalizedBills([newBill, ...finalizedBills]);
                setBillCounter(billCounter + 1);

                setBillForm({ clientId: '', items: [] });
                setActiveTab('mybills');
            };

            // Download Handlers
            const handleDownloadJPG = (billId) => {
                const element = document.getElementById(billId);

                html2canvas(element, { 
                    scale: 2, 
                    backgroundColor: '#ffffff',
                    onclone: (doc) => {
                        const clonedElement = doc.getElementById(billId);
                        if (clonedElement) clonedElement.classList.add('print-mode');
                    }
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `${billId}.jpg`;
                    link.href = canvas.toDataURL("image/jpeg", 0.9);
                    link.click();
                });
            };

            const handleDownloadPDF = (billId) => {
                const element = document.getElementById(billId);

                html2canvas(element, { 
                    scale: 2, 
                    backgroundColor: '#ffffff',
                    onclone: (doc) => {
                        const clonedElement = doc.getElementById(billId);
                        if (clonedElement) clonedElement.classList.add('print-mode');
                    }
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');

                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const imgProps = pdf.getImageProperties(imgData);
                    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

                    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save(`${billId}.pdf`);
                });
            };

            const handleWhatsAppShare = (bill) => {
                const text = `Hello ${bill.client.name},\n\nHere is the summary for your recent invoice *${bill.id}* from IZ-STOCK MANAGER:\n\n` +
                    bill.items.map(i => `• ${i.name} (x${i.quantity}) - ₹${(i.unitPrice * i.quantity).toFixed(2)}`).join('\n') +
                    `\n\n*Total Items:* ${bill.totalItems}\n*Total Amount:* ₹${bill.totalAmount.toFixed(2)}\n*Date:* ${bill.date}\n\nThank you for your business!`;

                const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
                window.open(url, '_blank');
            };

            const handleWhatsAppShareImage = (billId) => {
                const element = document.getElementById(billId);

                html2canvas(element, { 
                    scale: 2, 
                    backgroundColor: '#ffffff',
                    onclone: (doc) => {
                        const clonedElement = doc.getElementById(billId);
                        if (clonedElement) clonedElement.classList.add('print-mode');
                    }
                }).then(canvas => {
                    canvas.toBlob((blob) => {
                        const file = new File([blob], `Invoice_${billId}.jpg`, { type: 'image/jpeg' });
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            navigator.share({
                                files: [file],
                                title: `Invoice ${billId}`,
                                text: 'Here is the invoice image.'
                            }).catch(console.error);
                        } else {
                            const link = document.createElement('a');
                            link.download = `Invoice_${billId}.jpg`;
                            link.href = URL.createObjectURL(blob);
                            link.click();
                            alert('Image generated! It has been downloaded to your device. You can now attach it in WhatsApp manually.');
                            window.open('https://web.whatsapp.com', '_blank');
                        }
                    }, 'image/jpeg', 0.9);
                });
            };

            const handleWhatsAppSharePDF = (billId) => {
                const element = document.getElementById(billId);

                html2canvas(element, { 
                    scale: 2, 
                    backgroundColor: '#ffffff',
                    onclone: (doc) => {
                        const clonedElement = doc.getElementById(billId);
                        if (clonedElement) clonedElement.classList.add('print-mode');
                    }
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const imgProps = pdf.getImageProperties(imgData);
                    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);

                    const blob = pdf.output('blob');
                    const file = new File([blob], `Invoice_${billId}.pdf`, { type: 'application/pdf' });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({
                            files: [file],
                            title: `Invoice ${billId}`,
                            text: 'Here is the invoice document.'
                        }).catch(console.error);
                    } else {
                        pdf.save(`Invoice_${billId}.pdf`);
                        alert('PDF generated! It has been downloaded to your device. You can now attach it in WhatsApp manually.');
                        window.open('https://web.whatsapp.com', '_blank');
                    }
                });
            };

            const calculateBillTotal = () => {
                return billForm.items.reduce((sum, item) => sum + (item.quantity * item.unitPrice), 0).toFixed(2);
            };

            return (
                <div className="dashboardContainer">
                    <aside className="sidebar">
                        <div className="sidebarHeader">
                            <h1 className="title">IZ-STOCK MANAGER</h1>
                        </div>
                        <nav className="sideNav">
                            <button className={`navBtn ${activeTab === 'inventory' ? 'active' : ''}`} onClick={() => setActiveTab('inventory')}>
                                Main Inventory
                            </button>
                            <button className={`navBtn ${activeTab === 'update' ? 'active' : ''}`} onClick={() => setActiveTab('update')}>
                                Update Stock
                            </button>
                            <button className={`navBtn ${activeTab === 'billing' ? 'active' : ''}`} onClick={() => setActiveTab('billing')}>
                                Create Bill
                            </button>
                            <button className={`navBtn ${activeTab === 'mybills' ? 'active' : ''}`} onClick={() => setActiveTab('mybills')}>
                                My Bills ({finalizedBills.length})
                            </button>
                        </nav>

                        <div className="bottomActions">
                            <div style={{ marginBottom: '1rem', textAlign: 'center', fontSize: '0.85rem', color: 'var(--text-secondary)' }}>
                                Logged in as <strong style={{ color: 'var(--text-title)', textTransform: 'uppercase' }}>{currentUser}</strong>
                            </div>
                            <button className="secondaryButton" onClick={onLogout} style={{ width: '100%', marginBottom: '0.5rem', borderColor: '#ef4444', color: '#ef4444', backgroundColor: 'transparent' }}>
                                Logout
                            </button>
                            <button className="darkModeToggle" onClick={toggleDarkMode} style={{ marginBottom: '0.75rem' }}>
                                {isDarkMode ? '☀️ Light Mode' : '🌙 Night Mode'}
                            </button>
                            <div style={{ fontSize: '0.75rem', color: 'var(--text-secondary)', textAlign: 'center' }}>
                                Created by <strong>Izhan Hussain</strong>
                            </div>
                        </div>
                    </aside>

                    <main className="mainContent">
                        <div style={{ marginBottom: '2rem' }}>
                            <h2 style={{ fontSize: '1.75rem', fontWeight: '800', margin: '0', color: 'var(--text-title)' }}>
                                WELCOME, {currentUser.toUpperCase()}
                            </h2>
                            <p style={{ color: 'var(--text-secondary)', marginTop: '0.25rem' }}>Here is your stock overview.</p>
                        </div>

                        {activeTab === 'inventory' && (
                            <div className="tableCard">
                                <table className="stockTable">
                                    <thead>
                                        <tr>
                                            <th>Article Name</th>
                                            <th>Cost Price (Incoming)</th>
                                            <th>Selling Price (Outgoing)</th>
                                            <th>Current Stock</th>
                                            <th>Latest Association</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {inventory.map((item) => (
                                            <tr key={item.id} className="tableRow">
                                                <td className="articleName">
                                                    <span className="skuBadge">{item.sku}</span>
                                                    {item.name}
                                                </td>
                                                <td className="costPriceTag">₹{item.costPrice.toFixed(2)}</td>
                                                <td className="priceTag">₹{item.sellingPrice.toFixed(2)}</td>
                                                <td className="stockAmount">{item.currentStock} units</td>
                                                <td className="associatedEntity">
                                                    {item.lastTransaction?.type === 'INCOMING' ? (
                                                        <span className="tagManufacturer">Mfr: {item.lastTransaction.manufacturer.name}</span>
                                                    ) : item.lastTransaction?.type === 'OUTGOING' ? (
                                                        <span className="tagClient">Client: {item.lastTransaction.client.name}</span>
                                                    ) : (
                                                        <span className="tagNone">No Recent History</span>
                                                    )}
                                                </td>
                                                <td>
                                                    <span className={item.currentStock > 10 ? 'statusHealthy' : 'statusLow'}>
                                                        {item.currentStock > 10 ? 'In Stock' : 'Low Stock'}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'update' && (
                            <div className="card">
                                <h2 className="sectionTitle">Update Stock Entry</h2>
                                <form className="formLayout" onSubmit={handleUpdateStock}>
                                    <div className="formGroup">
                                        <label>Select Article</label>
                                        <select value={updateForm.articleId} onChange={e => setUpdateForm({ ...updateForm, articleId: e.target.value })} required>
                                            <option value="">Choose an article...</option>
                                            {inventory.map(item => <option key={item.id} value={item.id}>{item.name} (Stock: {item.currentStock} | Cost: ₹{item.costPrice.toFixed(2)} | Sell: ₹{item.sellingPrice.toFixed(2)})</option>)}
                                        </select>
                                    </div>

                                    <div className="formRow">
                                        <div className="formGroup">
                                            <label>Update Cost Price <span style={{ fontWeight: 'normal', color: 'var(--text-secondary)' }}>(Optional)</span></label>
                                            <input type="number" step="1" min="0" placeholder="Keep current cost" value={updateForm.costPrice} onChange={e => setUpdateForm({ ...updateForm, costPrice: e.target.value })} />
                                        </div>
                                        <div className="formGroup">
                                            <label>Update Selling Price <span style={{ fontWeight: 'normal', color: 'var(--text-secondary)' }}>(Optional)</span></label>
                                            <input type="number" step="1" min="0" placeholder="Keep current selling price" value={updateForm.sellingPrice} onChange={e => setUpdateForm({ ...updateForm, sellingPrice: e.target.value })} />
                                        </div>
                                    </div>

                                    <div className="formGroup">
                                        <label>Transaction Type</label>
                                        <select value={updateForm.type} onChange={e => setUpdateForm({ ...updateForm, type: e.target.value, entityId: '' })}>
                                            <option value="INCOMING">Incoming (Adding to Stock)</option>
                                            <option value="OUTGOING">Outgoing (Removing from Stock)</option>
                                        </select>
                                    </div>
                                    <div className="formGroup">
                                        <label>Quantity</label>
                                        <input type="number" min="1" value={updateForm.quantity} onChange={e => setUpdateForm({ ...updateForm, quantity: parseInt(e.target.value) || 1 })} required />
                                    </div>
                                    <div className="formGroup">
                                        <label>{updateForm.type === 'INCOMING' ? 'Select Manufacturer' : 'Select Client / Seller'}</label>
                                        <select value={updateForm.entityId} onChange={e => setUpdateForm({ ...updateForm, entityId: e.target.value })} required>
                                            <option value="">Select entity...</option>
                                            {updateForm.type === 'INCOMING'
                                                ? mockManufacturers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)
                                                : mockClients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)
                                            }
                                        </select>
                                    </div>
                                    <button type="submit" className="primaryButton" style={{ marginTop: '1rem' }}>Confirm Update</button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'billing' && (
                            <div className="card">
                                <h2 className="sectionTitle">Create New Bill</h2>
                                <div className="billingLayout">
                                    <div className="billForm">
                                        <div className="formGroup">
                                            <label>1. Select Client</label>
                                            <select value={billForm.clientId} onChange={e => setBillForm({ ...billForm, clientId: e.target.value })} required>
                                                <option value="">Choose a client...</option>
                                                {mockClients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                            </select>
                                        </div>
                                        <hr style={{ margin: '2rem 0', borderColor: 'var(--border-color)', borderWidth: '1px', borderStyle: 'solid' }} />
                                        <div className="formGroup">
                                            <label>2. Add Items to Bill</label>
                                            <div className="addItemGroup">
                                                <select value={currentBillItem.articleId} onChange={e => {
                                                    const selectedId = e.target.value;
                                                    const article = inventory.find(i => i.id === selectedId);
                                                    setCurrentBillItem({ 
                                                        ...currentBillItem, 
                                                        articleId: selectedId,
                                                        unitPrice: article ? article.sellingPrice : ''
                                                    });
                                                }}>
                                                    <option value="">Select Article...</option>
                                                    {inventory.filter(i => i.currentStock > 0).map(item => <option key={item.id} value={item.id}>{item.name} (Stock: {item.currentStock})</option>)}
                                                </select>
                                                <input type="number" min="0" step="0.01" placeholder="Price" value={currentBillItem.unitPrice} onChange={e => setCurrentBillItem({ ...currentBillItem, unitPrice: e.target.value })} style={{ width: '90px' }} />
                                                <input type="number" min="1" placeholder="Qty" value={currentBillItem.quantity} onChange={e => setCurrentBillItem({ ...currentBillItem, quantity: parseInt(e.target.value) || 1 })} style={{ width: '70px' }} />
                                                <button className="secondaryButton" onClick={handleAddBillItem}>Add</button>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="billSummary">
                                        <h3>
                                            <span>Bill Summary</span>
                                            <span style={{ color: '#2563eb' }}>INV-{billCounter.toString().padStart(4, '0')}</span>
                                        </h3>
                                        {billForm.items.length === 0 ? (
                                            <p className="emptyState">No items added to this bill yet.</p>
                                        ) : (
                                            <ul className="billList">
                                                {billForm.items.map((item, idx) => (
                                                    <li key={idx}>
                                                        <div className="topRow">
                                                            <span className="itemName">{item.name}</span>
                                                            <span className="itemQty">x{item.quantity}</span>
                                                        </div>
                                                        <div className="bottomRow">
                                                            <span>₹{item.unitPrice.toFixed(2)} each</span>
                                                            <span style={{ fontWeight: 600, color: 'var(--text-title)' }}>₹{(item.quantity * item.unitPrice).toFixed(2)}</span>
                                                        </div>
                                                    </li>
                                                ))}
                                            </ul>
                                        )}
                                        <div style={{ marginTop: 'auto', borderTop: '2px dashed var(--border-color)', paddingTop: '1rem', marginBottom: '1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                            <span style={{ fontWeight: 600 }}>Total Amount:</span>
                                            <span style={{ fontSize: '1.25rem', fontWeight: 800, color: 'var(--text-title)' }}>₹{calculateBillTotal()}</span>
                                        </div>
                                        <button
                                            className="primaryButton fullWidth"
                                            disabled={!billForm.clientId || billForm.items.length === 0}
                                            onClick={handleFinalizeBill}
                                        >
                                            Finalize Bill
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'mybills' && (
                            <div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                                    <h2 className="sectionTitle" style={{ margin: 0 }}>My Bills History</h2>
                                </div>

                                {finalizedBills.length === 0 ? (
                                    <div className="card" style={{ textAlign: 'center', padding: '4rem 2rem', color: 'var(--text-secondary)' }}>
                                        You have no finalized bills yet. Go to the "Create Bill" tab to generate one!
                                    </div>
                                ) : (
                                    <>
                                        <div className="multiSelectToolbar">
                                            <div className="selectionControls">
                                                <input
                                                    type="checkbox"
                                                    className="billCheckbox"
                                                    checked={selectedBills.length === finalizedBills.length && finalizedBills.length > 0}
                                                    onChange={selectAllBills}
                                                />
                                                <span style={{ fontWeight: 600, color: 'var(--text-title)' }}>
                                                    {selectedBills.length > 0 ? `${selectedBills.length} Selected` : 'Select All'}
                                                </span>
                                            </div>
                                            {selectedBills.length > 0 && (
                                                <div className="selectionControls">
                                                    <button className="secondaryButton" onClick={shareSelectedBills} style={{ padding: '0.5rem 1rem' }}>
                                                        Share Selected
                                                    </button>
                                                    <button className="secondaryButton" onClick={deleteSelectedBills} style={{ padding: '0.5rem 1rem', color: '#ef4444', borderColor: '#ef4444' }}>
                                                        Delete Selected
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                        <div className="billsGrid">
                                            {finalizedBills.map(bill => (
                                                <div key={bill.id} className="billCardWrapper" style={{ position: 'relative' }}>
                                                    <div style={{ position: 'absolute', top: '1.25rem', right: '1.25rem', zIndex: 10 }}>
                                                        <input
                                                            type="checkbox"
                                                            className="billCheckbox"
                                                            checked={selectedBills.includes(bill.id)}
                                                            onChange={() => toggleBillSelection(bill.id)}
                                                        />
                                                    </div>
                                                    <div id={bill.id} className="billContent">
                                                        <div className="billHeader" style={{ flexDirection: 'column', alignItems: 'flex-start', gap: '0.5rem' }}>
                                                            <div style={{ width: '100%', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                                                <h2 style={{ margin: 0, color: 'var(--nav-active-color)', fontWeight: 900, letterSpacing: '1px', fontSize: '1.8rem', textTransform: 'uppercase' }}>L-FOX</h2>
                                                            </div>
                                                            <div style={{ width: '100%', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '0.5rem' }}>
                                                                <h3 style={{ margin: 0, fontSize: '1.1rem', color: 'var(--text-secondary)' }}>Invoice {bill.id}</h3>
                                                                <span className="billDate">
                                                                    <span className="datePart">{bill.date.split(' ')[0]}</span>
                                                                    <span className="timePart"> {bill.date.split(' ').slice(1).join(' ')}</span>
                                                                </span>
                                                            </div>
                                                        </div>
                                                        <div className="billClientInfo">
                                                            <p style={{ color: 'var(--text-secondary)', fontSize: '0.8rem', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Billed To:</p>
                                                            <p style={{ fontWeight: '700', color: 'var(--text-title)', fontSize: '1.1rem' }}>{bill.client.name}</p>
                                                        </div>
                                                        <table className="billItemsTable">
                                                            <thead>
                                                                <tr>
                                                                    <th>Description</th>
                                                                    <th style={{ textAlign: 'center' }}>Qty</th>
                                                                    <th style={{ textAlign: 'right' }}>Total</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {bill.items.map((item, i) => (
                                                                    <tr key={i}>
                                                                        <td>
                                                                            {item.name}
                                                                            <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>₹{item.unitPrice.toFixed(2)} each</div>
                                                                        </td>
                                                                        <td style={{ textAlign: 'center' }}>{item.quantity}</td>
                                                                        <td style={{ textAlign: 'right', fontWeight: 500 }}>₹{(item.quantity * item.unitPrice).toFixed(2)}</td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                        <div className="billTotalSection">
                                                            <span style={{ color: 'var(--text-secondary)', fontSize: '0.9rem' }}>Items: {bill.totalItems}</span>
                                                            <span className="billTotal">Total: ₹{bill.totalAmount.toFixed(2)}</span>
                                                        </div>
                                                    </div>

                                                    <div className="billActions" style={{ flexDirection: 'column' }}>
                                                        <div style={{ display: 'flex', gap: '0.5rem', width: '100%' }}>
                                                            <button className="actionBtn btnJpg" onClick={() => handleDownloadJPG(bill.id)}>
                                                                ↓ Save Image
                                                            </button>
                                                            <button className="actionBtn btnPdf" onClick={() => handleDownloadPDF(bill.id)}>
                                                                ↓ Save PDF
                                                            </button>
                                                            <button className="actionBtn btnWa" onClick={() => setWaOptionsOpenFor(waOptionsOpenFor === bill.id ? null : bill.id)}>
                                                                <svg style={{ width: '18px', height: '18px', marginRight: '4px' }} viewBox="0 0 24 24" fill="currentColor">
                                                                    <path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.418-.099.824z" />
                                                                    <path d="M12.031 2c5.514 0 10 4.486 10 10s-4.486 10-10 10c-1.765 0-3.427-.46-4.887-1.261l-5.144 1.35 1.37-5.006c-.886-1.503-1.339-3.256-1.339-5.083 0-5.514 4.486-10 10-10zm0-2c-6.627 0-12 5.373-12 12 0 2.083.535 4.04 1.487 5.708l-1.487 6.292 6.442-1.689c1.616.853 3.488 1.319 5.558 1.319 6.627 0 12-5.373 12-12s-5.373-12-12-12z" />
                                                                </svg>
                                                                Share
                                                            </button>
                                                        </div>
                                                        {waOptionsOpenFor === bill.id && (
                                                            <div style={{ display: 'flex', gap: '0.5rem', width: '100%', marginTop: '0.5rem', animation: 'liquidEnter 0.3s forwards' }}>
                                                                <button className="actionBtn btnWa" style={{ flex: 1, padding: '0.5rem', fontSize: '0.75rem' }} onClick={() => handleWhatsAppShare(bill)}>💬 Text</button>
                                                                <button className="actionBtn btnWa" style={{ flex: 1, padding: '0.5rem', fontSize: '0.75rem' }} onClick={() => handleWhatsAppShareImage(bill.id)}>🖼️ Image</button>
                                                                <button className="actionBtn btnWa" style={{ flex: 1, padding: '0.5rem', fontSize: '0.75rem' }} onClick={() => handleWhatsAppSharePDF(bill.id)}>📄 PDF</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
